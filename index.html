var TQ=45,TM=45*60,PS=700;
var DF={"AI워크로드":"AI 워크로드","책임AI":"책임 AI","ML기본":"ML 기본","CV":"컴퓨터 비전","NLP":"자연어 처리","생성형AI":"생성형 AI"};
var DC={"AI워크로드":"#1565C0","책임AI":"#C62828","ML기본":"#0B3D91","CV":"#00838F","NLP":"#6A1B9A","생성형AI":"#FF6D00"};

// Storage
function sGet(k){try{return JSON.parse(localStorage.getItem(k));}catch(e){return null;}}
function sSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

// State
var qs,ci,ans,tl,tid,att=0;
var phase="home"; // home, exam, result, review, stats, generate

function sh(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=0|Math.random()*(i+1);var t=a[i];a[i]=a[j];a[j]=t;}return a;}
function fm(s){return ('0'+Math.floor(s/60)).slice(-2)+':'+('0'+(s%60)).slice(-2);}
function R(){return document.getElementById('root');}

function getPool(){
  var gen=sGet('ai900-gen')||[];
  return B.concat(gen);
}

function getHist(){return sGet('ai900-hist')||[];}
function getWrong(){return sGet('ai900-wrong')||{};}

// ═══ HOME ═══
function showHome(){
  phase="home";
  var hist=getHist();
  var pool=getPool();
  var best=hist.length?Math.max.apply(null,hist.map(function(h){return h.sc;})):0;
  var genCount=(sGet('ai900-gen')||[]).length;

  R().innerHTML='<div style="min-height:100vh;background:linear-gradient(135deg,#0D1B40,#1a237e);display:flex;align-items:center;justify-content:center;padding:16px"><div style="background:#fff;border-radius:20px;padding:40px 32px;max-width:500px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)"><div style="font-size:13px;font-weight:700;color:#FF6D00;letter-spacing:2px;margin-bottom:6px">MICROSOFT CERTIFIED</div><div style="font-size:42px;font-weight:900;color:#0D1B40">AI-900</div><div style="font-size:15px;color:#666;margin:4px 0 24px">Azure AI Fundamentals 모의시험</div><div style="background:#f8f9fa;border-radius:12px;padding:18px 22px;text-align:left;margin-bottom:16px;font-size:14px;line-height:2.2;color:#333">📝 <b>45문제</b> (총 '+pool.length+'문제 풀 랜덤)<br>⏱ <b>45분</b> · ✅ <b>700/1000점 합격</b></div>'+(genCount>0?'<div style="font-size:11px;color:#1565C0;font-weight:600;margin-bottom:6px">🤖 AI생성 '+genCount+'문제 포함</div>':'')+(hist.length>0?'<div style="font-size:12px;color:#FF6D00;font-weight:600;margin-bottom:12px">🔄 '+hist.length+'회 응시 · 최고 '+best+'점</div>':'')+'<button onclick="startExam()" class="btn" style="width:100%;padding:16px;font-size:18px;color:#fff;background:linear-gradient(135deg,#FF6D00,#FF8F00)">'+(hist.length>0?'다시 응시 🔄':'시험 시작 →')+'</button><div style="display:flex;gap:8px;margin-top:10px">'+(hist.length>0?'<button onclick="showStats()" class="btn" style="flex:1;padding:13px;font-size:14px;color:#0D1B40;background:#f0f0f0">📊 학습 분석</button>':'')+'<button onclick="showGenerate()" class="btn" style="flex:1;padding:13px;font-size:14px;color:#1565C0;background:#E8F0FE">🤖 AI 문제 생성</button></div></div></div>';
}

// ═══ EXAM ═══
function startExam(){
  var pool=getPool();
  qs=sh(pool).slice(0,TQ);ci=0;ans={};tl=TM;att++;phase="exam";
  clearInterval(tid);
  tid=setInterval(function(){
    tl--;var e=document.getElementById('tm');
    if(e){e.textContent='⏱ '+fm(tl);e.style.color=tl<300?'#E53935':'#0D1B40';e.style.background=tl<300?'#FFEBEE':'#f8f9fa';}
    if(tl<=0){clearInterval(tid);submitExam();}
  },1000);
  drawExam();
}

function drawExam(){
  var q=qs[ci],ac=Object.keys(ans).length;
  var dots='';
  for(var i=0;i<qs.length;i++){
    var bg=i==ci?'#0D1B40':ans[i]!=null?'#E8F0FE':'#fff';
    var co=i==ci?'#fff':ans[i]!=null?'#1565C0':'#bbb';
    dots+='<div onclick="ci='+i+';drawExam()" style="width:26px;height:26px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;cursor:pointer;border:1px solid '+(i==ci?'#0D1B40':'#e0e0e0')+';background:'+bg+';color:'+co+';margin:1px">'+(i+1)+'</div>';
  }
  var opts='';
  for(var j=0;j<q.o.length;j++){
    var s=ans[ci]==j;
    opts+='<div onclick="ans[ci]='+j+';drawExam()" style="padding:12px 14px;border-radius:10px;cursor:pointer;border:2px solid '+(s?'#1565C0':'#e8e8e8')+';background:'+(s?'#E8F0FE':'#fff')+';color:'+(s?'#0D47A1':'#333')+';font-size:13px;font-weight:'+(s?'600':'400')+';margin-bottom:7px;display:flex;align-items:center;gap:10px"><div style="width:20px;height:20px;border-radius:50%;border:2px solid '+(s?'#1565C0':'#ccc')+';background:'+(s?'#1565C0':'transparent')+';display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;color:#fff">'+(s?'●':'')+'</div>'+q.o[j]+'</div>';
  }
  var nav='<button onclick="if(ci>0){ci--;drawExam()}" '+(ci==0?'disabled':'')+' class="btn" style="flex:1;padding:13px;font-size:14px;border:2px solid #e0e0e0;background:#fff;color:'+(ci==0?'#ccc':'#0D1B40')+';opacity:'+(ci==0?'.4':'1')+'">← 이전</button>';
  if(ci<qs.length-1)nav+='<button onclick="ci++;drawExam()" class="btn" style="flex:1;padding:13px;font-size:14px;background:#0D1B40;color:#fff">다음 →</button>';
  else nav+='<button onclick="submitExam()" class="btn" style="flex:1;padding:13px;font-size:14px;background:linear-gradient(135deg,#FF6D00,#FF8F00);color:#fff">제출 ✓</button>';
  var early=ci<qs.length-1&&ac==qs.length?'<button onclick="submitExam()" class="btn" style="width:100%;margin-top:8px;padding:12px;font-size:13px;background:#FFF8E1;color:#FF6D00;border:2px solid #FFE0B2">전부 완료 — 제출</button>':'';

  R().innerHTML='<div style="min-height:100vh;background:#f5f5f5"><div style="position:sticky;top:0;z-index:10;background:#fff;border-bottom:1px solid #e0e0e0;box-shadow:0 2px 8px rgba(0,0,0,.05)"><div style="max-width:660px;margin:0 auto;padding:10px 16px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span style="font-size:14px;font-weight:800;color:#0D1B40">AI-900</span><div style="display:flex;align-items:center;gap:10px"><span style="font-size:12px;color:#999">'+ac+'/'+qs.length+'</span><span id="tm" style="font-size:16px;font-weight:800;padding:3px 10px;border-radius:8px;color:#0D1B40;background:#f8f9fa">⏱ '+fm(tl)+'</span></div></div><div style="height:4px;background:#e0e0e0;border-radius:2px"><div style="width:'+(ac/qs.length*100)+'%;height:100%;background:linear-gradient(90deg,#FF6D00,#FF8F00);border-radius:2px;transition:width .3s"></div></div></div></div><div style="max-width:660px;margin:0 auto;padding:16px"><div style="margin-bottom:14px">'+dots+'</div><div style="background:#fff;border-radius:16px;padding:24px 20px;box-shadow:0 2px 10px rgba(0,0,0,.05);border-top:4px solid '+(DC[q.d]||'#999')+'"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><span style="font-size:10px;font-weight:700;color:'+(DC[q.d]||'#999')+';background:'+(DC[q.d]||'#999')+'18;padding:2px 10px;border-radius:20px">'+(DF[q.d]||q.d)+'</span><span style="font-size:11px;color:#bbb">Q'+(ci+1)+'/'+qs.length+'</span></div><div style="font-size:14px;font-weight:600;line-height:1.6;margin-bottom:18px">'+q.q+'</div>'+opts+'</div><div style="display:flex;gap:10px;margin-top:14px">'+nav+'</div>'+early+'</div></div>';
}

// ═══ SUBMIT ═══
function submitExam(){
  clearInterval(tid);phase="result";
  var cc=0,ds={},nw=getWrong();
  for(var i=0;i<qs.length;i++){
    var d=qs[i].d;if(!ds[d])ds[d]={t:0,c:0};ds[d].t++;
    if(ans[i]==qs[i].a){cc++;ds[d].c++;}
    else{var k=qs[i].q.slice(0,40);nw[k]=(nw[k]||0)+1;}
  }
  var sc=Math.round(cc/qs.length*1000),pa=sc>=PS,el=TM-tl;
  var hist=getHist();
  hist.push({dt:new Date().toLocaleDateString('ko'),sc:sc,cc:cc,tot:qs.length,tm:el,ds:ds,pa:pa});
  sSet('ai900-hist',hist);sSet('ai900-wrong',nw);
  showResult();
}

// ═══ RESULT ═══
function showResult(){
  var hist=getHist();var r=hist[hist.length-1];
  var dsh='';
  for(var d in r.ds){var p=Math.round(r.ds[d].c/r.ds[d].t*100);dsh+='<div style="margin-bottom:6px"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px"><span style="font-weight:600;color:'+(DC[d]||'#999')+'">'+(DF[d]||d)+'</span><span style="color:#999">'+r.ds[d].c+'/'+r.ds[d].t+' ('+p+'%)</span></div><div style="height:6px;background:#e0e0e0;border-radius:3px"><div style="width:'+p+'%;height:100%;background:'+(p>=70?'#43A047':'#E53935')+';border-radius:3px"></div></div></div>';}
  var weak=[];for(var d in r.ds){var p=Math.round(r.ds[d].c/r.ds[d].t*100);if(p<70)weak.push(DF[d]||d);}

  R().innerHTML='<div style="min-height:100vh;background:'+(r.pa?'linear-gradient(135deg,#1B5E20,#2E7D32)':'linear-gradient(135deg,#B71C1C,#C62828)')+';padding:16px"><div style="max-width:540px;margin:0 auto"><div style="background:#fff;border-radius:20px;padding:36px 28px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3);margin-bottom:16px"><div style="font-size:52px;margin-bottom:4px">'+(r.pa?'🎉':'😢')+'</div><div style="font-size:24px;font-weight:900;color:'+(r.pa?'#1B5E20':'#B71C1C')+'">'+(r.pa?'합격 (PASS)':'불합격 (FAIL)')+'</div><div style="font-size:12px;color:#999;margin:6px 0 18px">소요: '+fm(r.tm)+' | '+hist.length+'회차</div><div style="display:flex;justify-content:center;gap:16px;margin-bottom:18px"><div style="background:#f8f9fa;border-radius:14px;padding:14px 24px"><div style="font-size:30px;font-weight:900;color:'+(r.pa?'#1B5E20':'#B71C1C')+'">'+r.sc+'</div><div style="font-size:10px;color:#999">/1000</div></div><div style="background:#f8f9fa;border-radius:14px;padding:14px 24px"><div style="font-size:30px;font-weight:900;color:#0D1B40">'+r.cc+'</div><div style="font-size:10px;color:#999">/'+r.tot+'</div></div></div>'+dsh+(weak.length>0?'<div style="margin-top:8px;padding:6px 10px;background:#FFEBEE;border-radius:8px;font-size:11px;color:#C62828;text-align:left">⚠ 약점: <b>'+weak.join(', ')+'</b></div>':'')+'<div style="display:flex;gap:8px;margin-top:16px"><button onclick="startExam()" class="btn" style="flex:1;padding:13px;font-size:14px;color:#fff;background:linear-gradient(135deg,#FF6D00,#FF8F00)">다시 응시</button><button onclick="showReview()" class="btn" style="flex:1;padding:13px;font-size:14px;color:#0D1B40;background:#f0f0f0">오답 리뷰</button><button onclick="showStats()" class="btn" style="flex:1;padding:13px;font-size:14px;color:#1565C0;background:#E8F0FE">📊 분석</button></div></div></div></div>';
}

// ═══ REVIEW ═══
function showReview(){
  phase="review";var wh='',wc=0;
  for(var i=0;i<qs.length;i++){
    if(ans[i]==qs[i].a)continue;wc++;var q=qs[i],oh='';
    for(var j=0;j<q.o.length;j++){var ic=j==q.a,iu=j==ans[i];oh+='<div style="padding:6px 10px;border-radius:8px;border:1.5px solid '+(ic?'#43A047':iu?'#E53935':'#e0e0e0')+';background:'+(ic?'#E8F5E9':iu?'#FFEBEE':'transparent')+';color:'+(ic?'#1B5E20':iu?'#B71C1C':'#444')+';font-size:12px;margin-bottom:4px">'+(ic?'✅ ':iu?'❌ ':'')+q.o[j]+'</div>';}
    wh+='<div style="border-left:4px solid '+(DC[q.d]||'#999')+';padding:14px 16px;margin-bottom:10px;background:#fff;border-radius:0 12px 12px 0"><div style="font-size:10px;font-weight:700;color:'+(DC[q.d]||'#999')+';margin-bottom:4px">'+(DF[q.d]||q.d)+'</div><div style="font-size:13px;font-weight:600;margin-bottom:10px;line-height:1.5">'+q.q+'</div>'+oh+'<div style="margin-top:6px;padding:6px 10px;background:#FFF8E1;border-radius:8px;font-size:11px;color:#E65100;line-height:1.5">💡 '+q.e+'</div></div>';
  }
  R().innerHTML='<div style="min-height:100vh;background:#f5f5f5;padding:16px"><div style="max-width:600px;margin:0 auto"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><span style="font-size:17px;font-weight:800">❌ 오답 리뷰 ('+wc+'문제)</span><button onclick="showResult()" class="btn" style="padding:8px 16px;font-size:12px;background:#FF6D00;color:#fff">← 결과</button></div>'+(wc==0?'<div style="background:#fff;border-radius:14px;padding:32px;text-align:center"><div style="font-size:44px">🎯</div><div style="font-size:15px;font-weight:700;margin-top:8px">전문 정답!</div></div>':wh)+'</div></div>';
}

// ═══ STATS ═══
function showStats(){
  phase="stats";var hist=getHist(),wm=getWrong();
  if(!hist.length){R().innerHTML='<div style="min-height:100vh;background:#f5f5f5;display:flex;align-items:center;justify-content:center;padding:16px"><div style="background:#fff;border-radius:14px;padding:32px;text-align:center;max-width:400px;width:100%"><div style="font-size:40px;margin-bottom:8px">📝</div><div style="font-size:15px;font-weight:700;margin-bottom:4px">아직 기록 없음</div><div style="font-size:12px;color:#999;margin-bottom:16px">시험을 먼저 응시해주세요</div><button onclick="showHome()" class="btn" style="padding:10px 20px;font-size:14px;background:#0D1B40;color:#fff">← 홈</button></div></div>';return;}

  var da={};hist.forEach(function(h){for(var d in h.ds){if(!da[d])da[d]={t:0,c:0};da[d].t+=h.ds[d].t;da[d].c+=h.ds[d].c;}});
  var avg=Math.round(hist.reduce(function(a,h){return a+h.sc;},0)/hist.length);
  var best=Math.max.apply(null,hist.map(function(h){return h.sc;}));
  var pass=hist.filter(function(h){return h.pa;}).length;

  var sum='<div style="display:flex;gap:8px;margin-bottom:12px">';
  [["총 응시",hist.length,"#0D1B40"],["최고",best,"#1B5E20"],["평균",avg,"#FF6D00"],["합격",pass,"#1565C0"]].forEach(function(x){
    sum+='<div style="flex:1;background:#f8f9fa;border-radius:10px;padding:10px;text-align:center"><div style="font-size:20px;font-weight:900;color:'+x[2]+'">'+x[1]+'</div><div style="font-size:9px;color:#999">'+x[0]+'</div></div>';
  });sum+='</div>';

  var chart='';
  hist.forEach(function(h,i){
    chart+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px"><span style="font-size:10px;color:#999;width:30px">'+(i+1)+'회</span><div style="flex:1;height:16px;background:#f0f0f0;border-radius:8px;overflow:hidden;position:relative"><div style="width:'+(h.sc/1000*100)+'%;height:100%;background:'+(h.pa?'#43A047':'#E53935')+';border-radius:8px"></div><div style="position:absolute;left:70%;top:0;bottom:0;width:2px;background:#FF6D00"></div></div><span style="font-size:10px;font-weight:700;color:'+(h.pa?'#1B5E20':'#B71C1C')+';width:40px;text-align:right">'+h.sc+'</span></div>';
  });

  var dom='';
  for(var d in da){var p=Math.round(da[d].c/da[d].t*100);dom+='<div style="margin-bottom:5px"><div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:1px"><span style="font-weight:600;color:'+(DC[d]||'#999')+'">'+(DF[d]||d)+'</span><span style="color:#999">'+da[d].c+'/'+da[d].t+' ('+p+'%)</span></div><div style="height:6px;background:#e0e0e0;border-radius:3px"><div style="width:'+p+'%;height:100%;background:'+(p>=70?'#43A047':'#E53935')+';border-radius:3px"></div></div></div>';}

  var tw=Object.entries(wm).sort(function(a,b){return b[1]-a[1];}).slice(0,8);
  var twh='';tw.forEach(function(x){twh+='<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #f0f0f0;font-size:10px"><span style="flex:1;color:#333">'+x[0]+'...</span><span style="color:#E53935;font-weight:700">'+x[1]+'회</span></div>';});

  R().innerHTML='<div style="min-height:100vh;background:#f5f5f5;padding:16px"><div style="max-width:560px;margin:0 auto"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><span style="font-size:17px;font-weight:800">📊 학습 분석</span><button onclick="showHome()" class="btn" style="padding:8px 16px;font-size:12px;background:#0D1B40;color:#fff">← 홈</button></div><div style="background:#fff;border-radius:14px;padding:16px;margin-bottom:12px">'+sum+'<div style="font-size:12px;font-weight:700;margin-bottom:8px">📈 점수 추이</div>'+chart+'<div style="font-size:9px;color:#FF6D00;margin-top:4px">▮ 합격선 700점</div></div><div style="background:#fff;border-radius:14px;padding:16px;margin-bottom:12px"><div style="font-size:12px;font-weight:700;margin-bottom:8px">🎯 영역별 누적 정답률</div>'+dom+'</div>'+(tw.length>0?'<div style="background:#fff;border-radius:14px;padding:16px;margin-bottom:12px"><div style="font-size:12px;font-weight:700;margin-bottom:8px">❌ 자주 틀리는 문제</div>'+twh+'</div>':'')+'<button onclick="if(confirm(\'모든 데이터를 초기화할까요?\')){localStorage.removeItem(\'ai900-hist\');localStorage.removeItem(\'ai900-wrong\');localStorage.removeItem(\'ai900-gen\');showHome();}" class="btn" style="width:100%;padding:10px;font-size:12px;background:#fff;color:#E53935;border:2px solid #FFCDD2">🗑 데이터 초기화</button></div></div>';
}

// ═══ AI GENERATE ═══
function showGenerate(){
  phase="generate";
  var apiKey=sGet('ai900-apikey')||'';
  var gen=sGet('ai900-gen')||[];
  var da={};var hist=getHist();
  hist.forEach(function(h){for(var d in h.ds){if(!da[d])da[d]={t:0,c:0};da[d].t+=h.ds[d].t;da[d].c+=h.ds[d].c;}});
  var weakList=[];
  for(var d in da){if(Math.round(da[d].c/da[d].t*100)<70)weakList.push(d);}

  var domBtns='<div onclick="selDom=\'auto\'" id="dbtn-auto" style="padding:6px 12px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;background:#FF6D00;color:#fff;display:inline-block;margin:2px">🎯 약점 자동</div>';
  for(var d in DF){domBtns+='<div onclick="selDom=\''+d+'\'" style="padding:6px 12px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;background:#f0f0f0;color:#666;display:inline-block;margin:2px">'+DF[d]+'</div>';}

  var genInfo='';
  if(gen.length>0){
    var gc={};gen.forEach(function(q){gc[q.d]=(gc[q.d]||0)+1;});
    var tags='';for(var d in gc)tags+='<span style="font-size:10px;padding:3px 8px;border-radius:6px;background:'+(DC[d]||'#999')+'18;color:'+(DC[d]||'#999')+';font-weight:600;margin:2px">'+(DF[d]||d)+' '+gc[d]+'</span>';
    genInfo='<div style="background:#fff;border-radius:14px;padding:16px;margin-bottom:12px"><div style="font-size:13px;font-weight:700;margin-bottom:8px">📚 AI 생성 문제: '+gen.length+'개</div><div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px">'+tags+'</div><button onclick="if(confirm(\'생성 문제를 초기화할까요?\')){sSet(\'ai900-gen\',[]);showGenerate();}" class="btn" style="width:100%;padding:8px;font-size:11px;background:#fff;color:#E53935;border:1.5px solid #FFCDD2">생성 문제 초기화</button></div>';
  }

  R().innerHTML='<div style="min-height:100vh;background:#f5f5f5;padding:16px"><div style="max-width:560px;margin:0 auto"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><span style="font-size:17px;font-weight:800">🤖 AI 문제 생성</span><button onclick="showHome()" class="btn" style="padding:8px 16px;font-size:12px;background:#0D1B40;color:#fff">← 홈</button></div><div style="background:#fff;border-radius:14px;padding:20px;margin-bottom:12px"><div style="font-size:12px;font-weight:600;margin-bottom:6px">🔑 Anthropic API Key</div><input id="apiKeyInput" type="password" value="'+apiKey+'" placeholder="sk-ant-api..." style="width:100%;padding:10px 12px;border:2px solid #e0e0e0;border-radius:8px;font-size:12px;margin-bottom:14px;box-sizing:border-box"><div style="font-size:12px;font-weight:600;margin-bottom:6px">영역 선택</div><div style="margin-bottom:14px">'+domBtns+'</div>'+(weakList.length>0?'<div style="padding:6px 10px;background:#FFF8E1;border-radius:8px;font-size:11px;color:#E65100;margin-bottom:14px">💡 약점: '+(weakList.map(function(d){return DF[d]||d;}).join(', '))+'</div>':'')+'<div style="font-size:12px;font-weight:600;margin-bottom:6px">생성 개수</div><div style="display:flex;gap:6px;margin-bottom:16px"><div onclick="genCnt=3" style="padding:6px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;background:#f0f0f0;color:#666">3문제</div><div onclick="genCnt=5" style="padding:6px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;background:#0D1B40;color:#fff">5문제</div><div onclick="genCnt=10" style="padding:6px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;background:#f0f0f0;color:#666">10문제</div></div><button id="genBtn" onclick="doGenerate()" class="btn" style="width:100%;padding:14px;font-size:15px;color:#fff;background:linear-gradient(135deg,#FF6D00,#FF8F00)">🤖 문제 생성하기</button><div id="genStatus" style="margin-top:10px;font-size:12px;color:#999;text-align:center"></div></div>'+genInfo+'</div></div>';
}

var selDom='auto',genCnt=5;

function doGenerate(){
  var apiKey=document.getElementById('apiKeyInput').value.trim();
  if(!apiKey){document.getElementById('genStatus').innerHTML='<span style="color:#E53935">❌ API Key를 입력해주세요</span>';return;}
  sSet('ai900-apikey',apiKey);

  var domain=selDom;
  if(domain==='auto'){
    var da={};var hist=getHist();
    hist.forEach(function(h){for(var d in h.ds){if(!da[d])da[d]={t:0,c:0};da[d].t+=h.ds[d].t;da[d].c+=h.ds[d].c;}});
    var worst=null,wp=100;
    for(var d in da){var p=Math.round(da[d].c/da[d].t*100);if(p<wp){wp=p;worst=d;}}
    domain=worst||'생성형AI';
  }

  var btn=document.getElementById('genBtn');
  btn.disabled=true;btn.textContent='⏳ AI가 문제를 만들고 있어요...';btn.style.background='#bbb';
  document.getElementById('genStatus').textContent='';

  var prompt='AI-900 시험 문제를 '+genCnt+'개 생성. 영역: '+(DF[domain]||domain)+'. 4지선다, 한국어, 실전 난이도. JSON 배열만 응답(마크다운 없이). 형식: [{"d":"'+domain+'","q":"문제","o":["1","2","3","4"],"a":정답인덱스,"e":"해설"}]';

  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:4000,messages:[{role:'user',content:prompt}]})
  }).then(function(r){return r.json();}).then(function(data){
    var text=(data.content||[]).map(function(c){return c.text||'';}).join('');
    var clean=text.replace(/```json|```/g,'').trim();
    var parsed=JSON.parse(clean);
    if(Array.isArray(parsed)&&parsed.length>0){
      var gen=sGet('ai900-gen')||[];
      gen=gen.concat(parsed);
      sSet('ai900-gen',gen);
      document.getElementById('genStatus').innerHTML='<span style="color:#1B5E20">✅ '+parsed.length+'문제 생성 완료! 총 '+gen.length+'문제</span>';
    }
    btn.disabled=false;btn.textContent='🤖 문제 생성하기';btn.style.background='linear-gradient(135deg,#FF6D00,#FF8F00)';
    setTimeout(showGenerate,1500);
  }).catch(function(err){
    document.getElementById('genStatus').innerHTML='<span style="color:#E53935">❌ 오류: '+err.message+'</span>';
    btn.disabled=false;btn.textContent='🤖 문제 생성하기';btn.style.background='linear-gradient(135deg,#FF6D00,#FF8F00)';
  });
}

showHome();
</script>
</body>
</html>
